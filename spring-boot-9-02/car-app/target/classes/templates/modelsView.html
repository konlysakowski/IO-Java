<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>CAR</title>
    <meta content="text/html; charset=utf-8" http-equiv="Content-Type"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <link href="https://fonts.googleapis.com/css?family=Orbitron" rel="stylesheet"/>
</head>
<body>
<header>
    <a href="./"><h1>Pix</h1></a>
    <h2 th:text="${name}"></h2>
    <h3>
    </h3>
</header>
<section>

    <table>
        <tr>
            <th>Brand logo</th>
            <th>Name</th>
            <th>Manufacturer</th>
            <th>Engine</th>
            <th>Dealerships</th>
        </tr>
        <tr th:each="m : ${models}">
            <td>
                <img th:src="${m.brandLogo}"/>
            </td>
            <td th:text="${m.name}"></td>
            <td>
                <a th:href="@{/models?manufacturerId={id}(id=${m.manufacturer.id})}"
                   th:text="${m.manufacturer.name} + ' ' + ${m.manufacturer.country}"></a>
            </td>
            <td class="engine" th:text="${m.engine}"></td>
            <td class="search-container">
                <a class="search" th:href="@{/dealerships?modelId={id}(id=${m.id})}"></a>
            </td>
        </tr>
    </table>

</section>
<div id="orders">
</div>
<footer>
    ${tip}
</footer>

</body>
</html>
